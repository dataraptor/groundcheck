[pytest]
# Standalone config for the browser e2e + axe-core audit layer (Split 11). Kept out
# of core/api/eval so `pytest e2e` has its own rootdir and markers; the per-layer
# suites are unaffected.
markers =
    e2e: browser end-to-end test (needs chromium + network for the CDN React load)
    api: needs a real LLM key — skipped without one
addopts = -ra
