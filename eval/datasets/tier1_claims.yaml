# --- vaccines (MMR) --------------------------------------------------------------- #
- id: t1-013
  topic: vaccines
  source: &src_vaccines "Vaccines help the immune system recognize and fight specific germs. The measles, mumps, and rubella (MMR) vaccine is given in two doses, usually in childhood. After vaccination, some people have mild side effects such as a sore arm or low fever. Serious side effects are rare. Measles can cause complications including pneumonia and, in rare cases, brain swelling."
  claim: "The MMR vaccine protects against measles, mumps, and rubella."
