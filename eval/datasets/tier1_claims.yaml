# --- type 2 diabetes -------------------------------------------------------------- #
- id: t1-007
  topic: type-2-diabetes
  source: &src_diabetes "Type 2 diabetes occurs when the body cannot use insulin properly, leading to high blood sugar. Common risk factors include being overweight, physical inactivity, and a family history of the disease. Many people have no symptoms in the early stages. Treatment usually starts with diet and exercise, and some patients later need oral medication or insulin. Regular blood sugar monitoring helps manage the condition."
  claim: "Type 2 diabetes involves the body not using insulin properly."
  gold_label: SUPPORTED
  frozen: false
  provenance: "authored 2026-06-20, human-reviewed"

