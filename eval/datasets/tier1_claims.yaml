# --- antibiotics ------------------------------------------------------------------ #
- id: t1-019
  topic: antibiotics
  source: &src_antibiotics "Antibiotics treat infections caused by bacteria. They do not work against viruses such as those that cause the common cold or the flu. Taking antibiotics when they are not needed can lead to antibiotic resistance, making future infections harder to treat. Patients should finish the full course prescribed by their doctor, even if they feel better."
  claim: "Antibiotics are used to treat bacterial infections."
  gold_label: SUPPORTED
