  source: &src_asthma "Asthma is a long-term condition that affects the airways in the lungs. During an asthma attack, the airways narrow and make breathing difficult. Common triggers include pollen, dust mites, smoke, and cold air. Many people manage asthma with two types of inhaler: a reliever for sudden symptoms and a preventer used daily. There is currently no cure, but most people can control their symptoms."
