# Tier-1 gold: fixed {source, claim, gold_label} grounding triples (spec §11, Appendix B.1).
#
# Provenance: authored 2026-06-20 with a strong model, then HUMAN-REVIEWED label by
# label against the Appendix A rubric (single-annotator gold — Shamim — so κ measures
# detector<->author agreement, not inter-annotator; stated plainly in the README, §11).
#
# 45 triples, balanced 15 SUPPORTED / 15 CONTRADICTED / 15 NOT_ENOUGH_INFO, spread across
# 9 short topics (not one-topic overfit, B.1). ~20% (9 items, 3 per class) are frozen:true
# — a held-out slice never tuned against (§11). Each topic's source paragraph is defined
# once with a YAML anchor (&src_*) and referenced (*src_*) by its claims.
#
# Rubric (Appendix A): SUPPORTED = source states/entails (paraphrase ok); CONTRADICTED =
# number/entity swap, opposite direction, or mutually exclusive; NOT_ENOUGH_INFO = source
# neither establishes nor conflicts (true-but-absent and unquantified-magnitude = NEI).
#
# The six Appendix B.1 worked examples are t1-001..t1-006 (verbatim claim text).

# --- hypertension (the §5 worked-example source) ---------------------------------- #
- id: t1-001
  topic: hypertension
  source: &src_hypertension "High blood pressure, also called hypertension, usually has no symptoms. A reading of 130/80 mm Hg or higher is considered high. Over time, high blood pressure raises the risk of heart attack, stroke, and kidney disease. Lifestyle changes such as reducing salt, exercising regularly, and maintaining a healthy weight can help lower blood pressure. Some people also need medicine to keep their blood pressure under control."
  claim: "A reading of 130/80 mm Hg or higher is high blood pressure."
  gold_label: SUPPORTED
  frozen: false
  provenance: "authored 2026-06-20, human-reviewed (Appendix B.1 worked example)"

